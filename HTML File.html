<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I LOVE YOU DONA</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
}

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:10;
}

h1{
    color:#ff1493;
    font-size:60px;
    text-shadow:0 0 20px #ff1493;
    animation: glow 1.5s infinite alternate;
}

p{
    color:white;
    font-size:25px;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ff1493;
    }
    to{
        text-shadow:0 0 35px #ff1493;
    }
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:red;
    font-size:25px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    100%{
        transform:translateY(-10vh) scale(1.5);
        opacity:0;
    }
}

/* Flower */
.flower{
    position:absolute;
    font-size:35px;
    animation: flowerMove 8s linear infinite;
}

@keyframes flowerMove{
    0%{
        transform:translateY(-10vh) rotate(0deg);
    }
    100%{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="center">
    <h1>I LOVE YOU DONA ❤️</h1>
    <p>You are my favorite person 🌸</p>
</div>

<script>

/* Hearts */
for(let i=0;i<30;i++){

    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    heart.style.fontSize=(20+Math.random()*30)+"px";

    document.body.appendChild(heart);
}

/* Flowers */
const flowers=["🌸","🌹","🌺","💐"];

for(let i=0;i<20;i++){

    let flower=document.createElement("div");
    flower.className="flower";
    flower.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(5+Math.random()*6)+"s";
    flower.style.fontSize=(25+Math.random()*25)+"px";

    document.body.appendChild(flower);
}

</script>

</body>
</html>
